<!-- Print size: 80mm × 80mm | Bleed: 3mm | Die-cut: Circle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Bleed area -->
  <circle cx="400" cy="400" r="400" fill="#4A9ED6"/>

  <!-- Cut border -->
  <circle cx="400" cy="400" r="394" fill="none" stroke="#0C3260" stroke-width="5"/>

  <!-- Circular text path -->
  <defs>
    <path id="arc05" d="M 400,400 m -360,0 a 360,360 0 1,1 720,0 a 360,360 0 1,1 -720,0"/>
  </defs>
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0C3260" opacity="0.6" letter-spacing="3">
    <textPath href="#arc05" startOffset="50%" text-anchor="middle">· SEAFOOD TRANSPARENCY · BLUE · TRACETHEBLUE.COM · SEAFOOD TRANSPARENCY · BLUE · TRACETHEBLUE.COM</textPath>
  </text>

  <!-- Fish silhouette - bold, centrepiece, facing right -->
  <g transform="translate(400, 400)">
    <!-- Body: rounded elliptical shape tapering to tail -->
    <path d="M -160,0 C -160,-70 -80,-120 20,-120 C 100,-120 160,-80 180,-30 C 180,-30 180,30 180,30 C 160,80 100,120 20,120 C -80,120 -160,70 -160,0 Z" fill="#0C3260"/>
    <!-- Tail: forked -->
    <path d="M 160,-30 L 230,-90 L 210,-10 L 230,70 L 160,10 Z" fill="#0C3260"/>
    <!-- Pectoral fin -->
    <path d="M -40,-20 C -60,-60 -20,-80 0,-50 C 10,-35 -20,-10 -40,-20 Z" fill="#0C3260" opacity="0.7"/>
    <!-- Eye: white circle -->
    <circle cx="-80" cy="-25" r="22" fill="#FFFFFF"/>
    <!-- Eye: navy pupil -->
    <circle cx="-75" cy="-28" r="11" fill="#0C3260"/>
  </g>

  <!-- Text: Your fish -->
  <text x="400" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#0C3260">Your fish</text>

  <!-- Text: has a story. -->
  <text x="400" y="580" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#0C3260">has a story.</text>

  <!-- Thin rule -->
  <line x1="250" y1="606" x2="550" y2="606" stroke="#0C3260" stroke-width="1.5" opacity="0.3"/>

  <!-- Ask Blue. -->
  <text x="400" y="642" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-style="italic" fill="#0C3260">Ask Blue.</text>

  <!-- tracetheblue.com -->
  <text x="400" y="680" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0C3260" letter-spacing="2">tracetheblue.com</text>
</svg>
