<!-- Print size: 88mm × 53mm | Bleed: 3mm | Die-cut: Pill / Stadium -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 530" width="880" height="530">
  <rect width="880" height="530" fill="#FFFFFF"/>

  <!-- Bleed area pill -->
  <rect x="0" y="0" width="880" height="530" rx="265" fill="#5DCAA5"/>

  <!-- Cut border -->
  <rect x="6" y="6" width="868" height="518" rx="259" fill="none" stroke="#0C3260" stroke-width="5"/>

  <!-- Fish 1: faces right, left side -->
  <g transform="translate(290, 210)">
    <path d="M -140,0 C -140,-55 -70,-95 15,-95 C 80,-95 130,-65 145,-25 L 145,25 C 130,65 80,95 15,95 C -70,95 -140,55 -140,0 Z" fill="#0C3260"/>
    <path d="M 125,-25 L 190,-72 L 175,-5 L 190,62 L 125,20 Z" fill="#0C3260"/>
    <path d="M -30,-15 C -48,-48 -14,-65 4,-42 C 12,-30 -15,-8 -30,-15 Z" fill="#0C3260" opacity="0.6"/>
    <circle cx="-68" cy="-22" r="18" fill="#FFFFFF"/>
    <circle cx="-63" cy="-25" r="9" fill="#0C3260"/>
  </g>

  <!-- Fish 2: faces left, right side (mirrored) -->
  <g transform="translate(590, 290) scale(-1,1)">
    <path d="M -140,0 C -140,-55 -70,-95 15,-95 C 80,-95 130,-65 145,-25 L 145,25 C 130,65 80,95 15,95 C -70,95 -140,55 -140,0 Z" fill="#0C3260" opacity="0.7"/>
    <path d="M 125,-25 L 190,-72 L 175,-5 L 190,62 L 125,20 Z" fill="#0C3260" opacity="0.7"/>
    <path d="M -30,-15 C -48,-48 -14,-65 4,-42 C 12,-30 -15,-8 -30,-15 Z" fill="#0C3260" opacity="0.5"/>
    <circle cx="-68" cy="-22" r="18" fill="#FFFFFF"/>
    <circle cx="-63" cy="-25" r="9" fill="#0C3260"/>
  </g>

  <!-- Text: The fish knows. -->
  <text x="440" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700" fill="#0C3260">The fish knows.</text>

  <!-- Credit line -->
  <text x="440" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0C3260" opacity="0.6" letter-spacing="1.5">Blue. · tracetheblue.com</text>
</svg>
