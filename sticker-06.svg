<!-- Print size: 56mm × 75mm | Bleed: 3mm | Die-cut: Rounded rectangle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 750" width="560" height="750">
  <rect width="560" height="750" fill="#FFFFFF"/>

  <!-- Bleed + shape -->
  <rect x="0" y="0" width="560" height="750" rx="54" fill="#F0F7FF"/>

  <!-- Cut border -->
  <rect x="6" y="6" width="548" height="738" rx="50" fill="none" stroke="#0C3260" stroke-width="5"/>

  <!-- Upper panel background -->
  <rect x="6" y="6" width="548" height="549" rx="50" fill="#F0F7FF"/>

  <!-- QR Code grid: 21x21 modules, each 22px, starting at (84,60) -->
  <g>
    <!-- Top-left finder pattern -->
    <rect x="84" y="60" width="154" height="154" fill="#0C3260"/>
    <rect x="106" y="82" width="110" height="110" fill="#F0F7FF"/>
    <rect x="128" y="104" width="66" height="66" fill="#0C3260"/>

    <!-- Top-right finder pattern -->
    <rect x="392" y="60" width="154" height="154" fill="#0C3260"/>
    <rect x="414" y="82" width="110" height="110" fill="#F0F7FF"/>
    <rect x="436" y="104" width="66" height="66" fill="#0C3260"/>

    <!-- Bottom-left finder pattern -->
    <rect x="84" y="368" width="154" height="154" fill="#0C3260"/>
    <rect x="106" y="390" width="110" height="110" fill="#F0F7FF"/>
    <rect x="128" y="412" width="66" height="66" fill="#0C3260"/>

    <!-- Timing pattern - horizontal row at y=192 -->
    <rect x="260" y="192" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="192" width="22" height="22" fill="#0C3260"/>
    <rect x="348" y="192" width="22" height="22" fill="#0C3260"/>

    <!-- Timing pattern - vertical col at x=216 -->
    <rect x="216" y="236" width="22" height="22" fill="#0C3260"/>
    <rect x="216" y="280" width="22" height="22" fill="#0C3260"/>
    <rect x="216" y="324" width="22" height="22" fill="#0C3260"/>

    <!-- Data modules - navy -->
    <rect x="260" y="60" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="82" width="22" height="22" fill="#0C3260"/>
    <rect x="348" y="60" width="22" height="22" fill="#0C3260"/>
    <rect x="260" y="104" width="22" height="22" fill="#0C3260"/>
    <rect x="326" y="104" width="22" height="22" fill="#0C3260"/>
    <rect x="260" y="148" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="148" width="22" height="22" fill="#0C3260"/>
    <rect x="348" y="148" width="22" height="22" fill="#0C3260"/>

    <rect x="260" y="236" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="258" width="22" height="22" fill="#0C3260"/>
    <rect x="348" y="236" width="22" height="22" fill="#0C3260"/>
    <rect x="260" y="280" width="22" height="22" fill="#0C3260"/>
    <rect x="326" y="302" width="22" height="22" fill="#0C3260"/>
    <rect x="260" y="324" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="346" width="22" height="22" fill="#0C3260"/>
    <rect x="348" y="324" width="22" height="22" fill="#0C3260"/>

    <rect x="84" y="236" width="22" height="22" fill="#0C3260"/>
    <rect x="128" y="258" width="22" height="22" fill="#0C3260"/>
    <rect x="84" y="302" width="22" height="22" fill="#0C3260"/>
    <rect x="150" y="324" width="22" height="22" fill="#0C3260"/>

    <rect x="260" y="368" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="390" width="22" height="22" fill="#0C3260"/>
    <rect x="260" y="412" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="434" width="22" height="22" fill="#0C3260"/>
    <rect x="348" y="390" width="22" height="22" fill="#0C3260"/>
    <rect x="260" y="456" width="22" height="22" fill="#0C3260"/>
    <rect x="326" y="456" width="22" height="22" fill="#0C3260"/>
    <rect x="260" y="500" width="22" height="22" fill="#0C3260"/>
    <rect x="304" y="478" width="22" height="22" fill="#0C3260"/>

    <!-- Right column data -->
    <rect x="392" y="236" width="22" height="22" fill="#0C3260"/>
    <rect x="436" y="258" width="22" height="22" fill="#0C3260"/>
    <rect x="480" y="236" width="22" height="22" fill="#0C3260"/>
    <rect x="524" y="258" width="22" height="22" fill="#0C3260"/>
    <rect x="392" y="302" width="22" height="22" fill="#0C3260"/>
    <rect x="458" y="302" width="22" height="22" fill="#0C3260"/>
    <rect x="524" y="302" width="22" height="22" fill="#0C3260"/>
    <rect x="392" y="346" width="22" height="22" fill="#0C3260"/>
    <rect x="480" y="346" width="22" height="22" fill="#0C3260"/>

    <!-- Cyan cluster: bottom-right quadrant (cols 14-20, rows 14-20) -->
    <rect x="392" y="368" width="22" height="22" fill="#4A9ED6"/>
    <rect x="436" y="368" width="22" height="22" fill="#4A9ED6"/>
    <rect x="480" y="390" width="22" height="22" fill="#4A9ED6"/>
    <rect x="524" y="368" width="22" height="22" fill="#4A9ED6"/>
    <rect x="392" y="412" width="22" height="22" fill="#4A9ED6"/>
    <rect x="458" y="412" width="22" height="22" fill="#4A9ED6"/>
    <rect x="524" y="412" width="22" height="22" fill="#4A9ED6"/>
    <rect x="414" y="434" width="22" height="22" fill="#4A9ED6"/>
    <rect x="480" y="434" width="22" height="22" fill="#4A9ED6"/>
    <rect x="392" y="456" width="22" height="22" fill="#4A9ED6"/>
    <rect x="436" y="478" width="22" height="22" fill="#4A9ED6"/>
    <rect x="502" y="456" width="22" height="22" fill="#4A9ED6"/>
    <rect x="524" y="478" width="22" height="22" fill="#4A9ED6"/>
    <rect x="458" y="500" width="22" height="22" fill="#4A9ED6"/>
    <rect x="524" y="500" width="22" height="22" fill="#4A9ED6"/>
    <rect x="392" y="500" width="22" height="22" fill="#4A9ED6"/>
  </g>

  <!-- Cyan divider -->
  <line x1="6" y1="555" x2="554" y2="555" stroke="#4A9ED6" stroke-width="3"/>

  <!-- Navy footer -->
  <rect x="6" y="555" width="548" height="189" fill="#0C3260"/>
  <!-- Round bottom corners -->
  <clipPath id="footerClip">
    <rect x="6" y="555" width="548" height="189" rx="50"/>
  </clipPath>
  <rect x="6" y="555" width="548" height="189" fill="#0C3260" clip-path="url(#footerClip)"/>

  <!-- Scan it. -->
  <text x="280" y="635" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF">Scan it.</text>

  <!-- Know it. -->
  <text x="280" y="710" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#4A9ED6">Know it.</text>

  <!-- tracetheblue.com -->
  <text x="280" y="738" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4A9ED6" letter-spacing="2">tracetheblue.com</text>
</svg>
