  <!-- Cyan divider -->
  <line x1="6" y1="525" x2="554" y2="525" stroke="#4A9ED6" stroke-width="2"/>

  <!-- Navy footer -->
  <rect x="6" y="525" width="548" height="169" rx="0" fill="#0C3260"/>
  <rect x="6" y="654" width="40" height="40" rx="40" fill="#0C3260"/>
  <rect x="514" y="654" width="40" height="40" rx="40" fill="#0C3260"/>

  <!-- Scan it. -->
  <text x="280" y="590" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">Scan it.</text>

  <!-- Know it. -->
  <text x="280" y="640" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#4A9ED6">Know it.</text>

  <!-- tracetheblue.com -->
  <text x="280" y="672" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4A9ED6" letter-spacing="2">tracetheblue.com</text>
