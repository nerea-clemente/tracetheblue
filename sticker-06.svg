<!-- Print size: 56mm × 70mm | Bleed: 3mm | Die-cut: Rounded rectangle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 700" width="560" height="700">
  <rect width="560" height="700" fill="#FFFFFF"/>

  <!-- Bleed area -->
  <rect x="0" y="0" width="560" height="700" rx="44" fill="#F0F7FF"/>

  <!-- Die-cut border -->
  <rect x="6" y="6" width="548" height="688" rx="40" fill="none" stroke="#0C3260" stroke-width="4"/>

  <!-- Upper panel: whisper blue with QR -->
  <rect x="6" y="6" width="548" height="519" rx="40" fill="#F0F7FF"/>

  <!-- QR Code - Decorative -->
  <g transform="translate(155, 80)">
    <!-- Top-left finder -->
    <rect x="0" y="0" width="42" height="42" fill="#0C3260"/>
    <rect x="6" y="6" width="30" height="30" fill="#F0F7FF"/>
    <rect x="12" y="12" width="18" height="18" fill="#0C3260"/>

    <!-- Top-right finder -->
    <rect x="208" y="0" width="42" height="42" fill="#0C3260"/>
    <rect x="214" y="6" width="30" height="30" fill="#F0F7FF"/>
    <rect x="220" y="12" width="18" height="18" fill="#0C3260"/>

    <!-- Bottom-left finder -->
    <rect x="0" y="208" width="42" height="42" fill="#0C3260"/>
    <rect x="6" y="214" width="30" height="30" fill="#F0F7FF"/>
    <rect x="12" y="220" width="18" height="18" fill="#0C3260"/>

    <!-- Data grid - navy squares -->
    <rect x="54" y="6" width="12" height="12" fill="#0C3260"/>
