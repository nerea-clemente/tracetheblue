<!-- Print size: 88mm × 50mm | Bleed: 3mm | Die-cut: Pill / Stadium -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#FFFFFF"/>

  <!-- Bleed area pill -->
  <rect x="0" y="0" width="880" height="500" rx="250" fill="#5DCAA5"/>

  <!-- Die-cut border -->
  <rect x="6" y="6" width="868" height="488" rx="244" fill="#5DCAA5" stroke="#0C3260" stroke-width="5"/>

  <!-- Main text: Nothing -->
  <text x="440" y="220" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" fill="#0C3260">Nothing</text>

  <!-- Main text: to hide. -->
  <text x="440" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" fill="#0C3260">to hide.</text>

  <!-- Bottom credit -->
  <text x="440" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0C3260" opacity="0.55" letter-spacing="1.5">Blue. · tracetheblue.com</text>
</svg>
