<!-- Print size: 80mm × 50mm | Bleed: 3mm | Die-cut: Rounded rectangle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- Bleed area -->
  <rect x="0" y="0" width="800" height="500" rx="40" fill="#4A9ED6"/>

  <!-- Cut border -->
  <rect x="6" y="6" width="788" height="488" rx="36" fill="none" stroke="#0C3260" stroke-width="5"/>

  <!-- Certification pills row -->
  <g transform="translate(0, 100)">
    <rect x="80" y="0" width="100" height="36" rx="18" fill="#FFFFFF" opacity="0.2"/>
    <text x="130" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">ASC</text>

    <rect x="200" y="0" width="140" height="36" rx="18" fill="#FFFFFF" opacity="0.2"/>
    <text x="270" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">GlobalG.A.P.</text>

    <rect x="360" y="0" width="120" height="36" rx="18" fill="#FFFFFF" opacity="0.2"/>
    <text x="420" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">IFFO RS</text>

    <rect x="500" y="0" width="100" height="36" rx="18" fill="#FFFFFF" opacity="0.2"/>
    <text x="550" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">CO2e</text>

    <rect x="620" y="0" width="100" height="36" rx="18" fill="#FFFFFF" opacity="0.2"/>
    <text x="670" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">FIFO</text>
  </g>

  <!-- Main text -->
  <text x="400" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF">Your data exists.</text>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#0C3260">Make it visible.</text>

  <!-- Rule -->
  <line x1="220" y1="325" x2="580" y2="325" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>

  <!-- Subtext -->
  <text x="400" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#FFFFFF" opacity="0.8">BluePrint. From farm to shelf in 10 days.</text>

  <!-- Blue. + url -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Blue.</text>
  <text x="400" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.6" letter-spacing="2">tracetheblue.com</text>
</svg>
