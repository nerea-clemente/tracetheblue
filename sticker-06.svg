    <rect x="6" y="54" width="12" height="12" fill="#0C3260"/>
    <rect x="18" y="78" width="12" height="12" fill="#0C3260"/>
    <rect x="6" y="102" width="12" height="12" fill="#0C3260"/>
    <rect x="30" y="114" width="12" height="12" fill="#0C3260"/>
    <rect x="6" y="138" width="12" height="12" fill="#0C3260"/>
    <rect x="24" y="162" width="12" height="12" fill="#0C3260"/>
