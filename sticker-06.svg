    <rect x="54" y="54" width="12" height="12" fill="#0C3260"/>
    <rect x="78" y="66" width="12" height="12" fill="#0C3260"/>
    <rect x="102" y="54" width="12" height="12" fill="#0C3260"/>
    <rect x="126" y="72" width="12" height="12" fill="#0C3260"/>
    <rect x="150" y="54" width="12" height="12" fill="#0C3260"/>
    <rect x="174" y="60" width="12" height="12" fill="#0C3260"/>
